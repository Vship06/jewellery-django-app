{% extends 'products/base.html' %}
{% block content %}
<div id="profile-container" class="container-fluid py-5 d-flex justify-content-center align-items-center" style="min-height: 75vh; background-color: #fcfbf9;">
    <div class="w-100 luxury-profile-card text-center" style="max-width: 500px; padding: 4rem 3rem;">
        <div class="mb-3"><i class="bi bi-check-circle-fill text-success" style="font-size: 3rem;"></i></div>
        <h2 class="font-serif mb-3" style="font-size: 1.8rem; color: #2a0e14;">Password Rewritten</h2>
        <p class="account-concierge-desc small mb-4">Your brand new password credentials are now live across active database entries.</p>
        <a href="{% url 'user-login' %}" class="btn btn-dark rounded-0 px-4 py-2 text-uppercase tracking-widest" style="background-color: #3b141c; border-color: #d4af37; color: #ffffff; font-size: 0.7rem;">
            Secure Sign In
        </a>
    </div>
</div>
{% endblock %}
