{% extends 'products/base.html' %}
{% block content %}
<div id="profile-container" class="container-fluid py-5 d-flex justify-content-center align-items-center" style="min-height: 75vh; background-color: #fcfbf9;">
    <div class="w-100 luxury-profile-card" style="max-width: 500px; padding: 3rem;">
        <div class="text-center mb-4">
            <h2 class="font-serif mb-2" style="font-size: 1.8rem;">Establish New Credentials</h2>
            <p class="account-concierge-desc small">Your one-time security token has been validated. Enter your new account password below.</p>
        </div>
        <form method="POST" class="m-0 p-0">
            {% csrf_token %}
            {% if form.errors %}
                <div class="p-3 mb-3 text-danger small bg-danger bg-opacity-10" style="border-left: 3px solid #dc3545;">{{ form.errors }}</div>
            {% endif %}
            {% for field in form %}
                <div class="mb-3">
                    <label class="luxury-dossier-label text-uppercase tracking-wider d-block mb-2">{{ field.label }}</label>
                    <input type="password" name="{{ field.html_name }}" class="p-3 luxury-dossier-value w-100 border-0" required style="outline: none;">
                </div>
            {% endfor %}
            <button type="submit" class="btn btn-dark rounded-0 w-100 py-3 text-uppercase tracking-widest" style="background-color: #3b141c; border-color: #d4af37; color: #ffffff; font-size: 0.75rem;">
                Overwrite Password
            </button>
        </form>
    </div>
</div>
{% endblock %}
