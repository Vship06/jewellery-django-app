{% extends 'products/base.html' %}
{% load static %}

{% block content %}
<div id="profile-container" class="container-fluid py-5 d-flex justify-content-center align-items-center" style="min-height: 75vh; background-color: #fcfbf9;">
    <div class="w-100 luxury-profile-card" style="max-width: 800px; padding: 3rem;">
        
        <div class="text-center mb-5">
            <span class="d-block text-uppercase tracking-wider small mb-2" style="color: #d4af37; font-size: 0.7rem; letter-spacing: 2px;">Client Dossier</span>
            <h2 class="font-serif mb-2" style="font-size: 2.2rem; letter-spacing: 1px;">Modify Profile</h2>
        </div>
        
        <form method="POST" class="m-0 p-0">
            {% csrf_token %}
            
            <div class="row g-4">
               <div class="col-md-6">   
                    <label class="luxury-dossier-label text-uppercase tracking-wider d-block mb-2">Account Username</label>
                    <input type="text" name="username" class="p-3 luxury-dossier-value font-monospace w-100 border-0" value="{{ request.user.username }}" readonly style="cursor: not-allowed; opacity: 0.85;">
                </div>

                <div class="col-md-6">
                    <label class="luxury-dossier-label text-uppercase tracking-wider d-block mb-2">Membership Commenced</label>
                    <input type="text" class="p-3 luxury-dossier-value font-monospace w-100 border-0" value="{{ request.user.date_joined|date:'F d, Y' }}" disabled>
                </div>

                <div class="col-md-6">
                    <label class="luxury-dossier-label text-uppercase tracking-wider d-block mb-2">Email Address</label>
                    <input type="email" name="email" class="p-3 luxury-dossier-value font-monospace w-100" value="{{ u_form.email.value|default:'' }}" required>
                </div>

                <div class="col-md-6">
                    <label class="luxury-dossier-label text-uppercase tracking-wider d-block mb-2">Secure Contact Phone</label>
                    <input type="text" name="phone_number" class="p-3 luxury-dossier-value font-monospace w-100" value="{{ p_form.phone_number.value|default:'' }}" placeholder="+1 (___) ___-____">
                </div>
                <div class="col-12 mt-4 text-center">
                    <a href="{% url 'password-change' %}" class="btn btn-sm btn-outline-dark rounded-0 px-4 py-2 text-uppercase tracking-wider font-monospace" style="font-size: 0.7rem; border-color: rgba(0,0,0,0.15); color: #4a453e;">
                        <i class="bi bi-key-fill me-2 text-muted"></i> Modify Security Password
                    </a>
                </div>
                <div class="col-12 mt-5 text-center">
                    <button type="submit" class="btn btn-dark rounded-0 px-5 py-3 text-uppercase tracking-widest" style="background-color: #3b141c; border-color: #d4af37; color: #ffffff; font-size: 0.75rem;">
                        Save Portfolio Updates
                    </button>
                    <a href="{% url 'product-home' %}" class="d-block mt-3 small text-muted text-decoration-none text-uppercase tracking-wider" style="font-size: 0.65rem;">Cancel & Return</a>
                </div>
            </div>
        </form>

    </div>
</div>
{% endblock %}
