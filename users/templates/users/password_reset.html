{% extends 'products/base.html' %}
{% block content %}
<div id="profile-container" class="container-fluid py-5 d-flex justify-content-center align-items-center" style="min-height: 75vh; background-color: #fcfbf9;">
    <div class="w-100 luxury-profile-card" style="max-width: 500px; padding: 3rem;">
        <div class="text-center mb-4">
            <span class="d-block text-uppercase tracking-wider small mb-2" style="color: #d4af37; font-size: 0.7rem; letter-spacing: 2px;">Account Recovery</span>
            <h2 class="font-serif mb-2" style="font-size: 2rem;">Reset Password</h2>
            <p class="account-concierge-desc small">Enter your email address to generate a secure authentication recovery link.</p>
        </div>
        <form method="POST" class="m-0 p-0">
            {% csrf_token %}
            <div class="mb-4">
                <label class="luxury-dossier-label text-uppercase tracking-wider d-block mb-2">Registered Email Address</label>
                <input type="email" name="email" class="p-3 luxury-dossier-value w-100 border-0" required style="outline: none;">
            </div>
            <button type="submit" class="btn btn-dark rounded-0 w-100 py-3 text-uppercase tracking-widest" style="background-color: #3b141c; border-color: #d4af37; color: #ffffff; font-size: 0.75rem;">
                Send Recovery Token
            </button>
        </form>
    </div>
</div>
{% endblock %}
